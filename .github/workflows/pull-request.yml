name: Run Package Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        php: ['8.4']
        # lowest  -> Laravel 12 / scout 11.0 / typesense-php 5.0
        # highest -> Laravel 13 / latest scout / typesense-php 5.x
        dependency-versions: ['lowest', 'highest']
        typesense-version: ['27.1']

    name: PHP ${{ matrix.php }} - deps ${{ matrix.dependency-versions }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: curl, mbstring, json
          coverage: none

      - name: Start Typesense
        uses: jirevwe/typesense-github-action@v1.0.1
        with:
          typesense-version: ${{ matrix.typesense-version }}
          typesense-port: 8108
          typesense-api-key: xyz

      - name: Validate composer.json
        run: composer validate --no-check-publish --no-check-lock

      - name: Install dependencies
        uses: ramsey/composer-install@v3
        with:
          dependency-versions: ${{ matrix.dependency-versions }}
          composer-options: --prefer-dist

      - name: Wait for Typesense
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8108/health; then
              echo "Typesense is up"
              exit 0
            fi
            sleep 2
          done
          echo "Typesense did not become healthy in time"
          exit 1

      - name: Run tests
        run: vendor/bin/phpunit
        env:
          TYPESENSE_HOST: localhost
          TYPESENSE_PORT: 8108
          TYPESENSE_PROTOCOL: http
          TYPESENSE_API_KEY: xyz
