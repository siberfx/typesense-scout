name: Run Project Tests

on:
  pull_request:
    branches: [main]

jobs:
  scout-import-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: test
      DB_USERNAME: root
      DB_PASSWORD: root

    steps:
      - name: Checkout test application
        uses: actions/checkout@v4
        with:
          repository: arayiksmbatyan/scout-import-tests

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: curl, mbstring, json, pdo_mysql
          coverage: none

      - name: Start Typesense
        uses: jirevwe/typesense-github-action@v1.0.1
        with:
          typesense-version: '27.1'
          typesense-port: 8108
          typesense-api-key: xyz

      - name: Wait for Typesense
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8108/health; then
              echo "Typesense is up"
              exit 0
            fi
            sleep 2
          done
          echo "Typesense did not become healthy in time"
          exit 1

      - name: Validate composer.json
        run: composer validate --no-check-publish --no-check-lock

      - name: Install dependencies
        uses: ramsey/composer-install@v3
        with:
          composer-options: --prefer-dist

      - name: Prepare application environment
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Run migrations and seeders
        run: php artisan migrate --seed

      - name: Run tests
        run: php artisan test
